name: Bug Report

description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        Describe the bug clearly and concisely.

        ## Environment
        - Linux kernel version:
        - GCC/Clang version:
        - VoYah version (run `./bin/scheduler --version` if available):

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Relevant Log Output"
      description: Attach scheduler_*.jsonl logs or terminal output here
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "I have searched existing issues and confirmed this is not a duplicate"
          required: true
        - label: "I am using the latest version of VoYah"
          required: true
